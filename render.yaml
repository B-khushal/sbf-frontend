# Render Configuration for SBF Florist Frontend
# This file configures the React + Vite app as a Static Site on Render

services:
  # Frontend - Static Site Service
  - type: web
    name: sbf-frontend
    env: static
    buildCommand: chmod +x render-build.sh && ./render-build.sh
    staticPublishPath: ./dist
    
    # Enable SPA routing with proper 404 fallback
    pullRequestPreviewsEnabled: true
    
    # Headers for proper CORS and caching
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-XSS-Protection
        value: 1; mode=block
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    
    # Routes configuration for SPA
    # Important: Render's static sites automatically serve index.html for 404s
    # if the 404.html doesn't exist, which enables SPA routing
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    
    # Environment variables for build
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://sbf-backend.onrender.com/api
      - key: VITE_UPLOADS_URL
        value: https://sbf-backend.onrender.com
      - key: VITE_ENABLE_PAYMENT
        value: true
      - key: VITE_MOCK_PAYMENT
        value: false
      - key: VITE_ENABLE_ANALYTICS
        value: true
      - key: VITE_ENABLE_EMAIL
        value: true
      - key: VITE_DEV_LOGGING
        value: false

# ============================================
# Nginx Configuration for SBF Florist Frontend
# ============================================
# Optimized for Docker + Dokploy deployment
# Domain: sbflorist.in | API: api.sbflorist.in
# ============================================

server {
    listen 80;
    server_name sbflorist.in www.sbflorist.in localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ──────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://checkout.razorpay.com https://cdn.razorpay.com https://apis.google.com https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' http://localhost:5000 https://api.sbflorist.in https://api.razorpay.com https://lumberjack.razorpay.com https://accounts.google.com wss:; frame-src https://checkout.razorpay.com https://api.razorpay.com https://accounts.google.com https://www.google.com;" always;

    # Allow Google OAuth popup and fix FedCM issues
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Cross-Origin-Embedder-Policy "unsafe-none" always;

    # Increase client max body size for file uploads
    client_max_body_size 50M;

    # ── Crawler Interceptor for Products ──────
    # Intercept social media crawler bots and proxy them to the backend to get server-rendered Open Graph tags.
    location ~* ^/(product|products|valentine-product)/([^/]+)$ {
        set $is_crawler 0;
        if ($http_user_agent ~* "facebookexternalhit|twitterbot|LinkedInBot|whatsapp|telegrambot|discordbot|slackbot|vkShare|redditbot|Applebot|Pinterestbot") {
            set $is_crawler 1;
        }

        if ($is_crawler = 1) {
            proxy_pass http://sbf-backend:5000/api/products/share-preview/$1/$2;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            break;
        }

        try_files $uri $uri/ /index.html;
    }

    # ── SPA Routing ───────────────────────────
    # All non-file routes fall back to index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static Asset Caching ──────────────────
    # Vite hashed assets — long cache (1 year)
    location ~* \.(?:js|css|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Images — moderate cache (30 days)
    location ~* \.(?:png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # ── Gzip Compression ─────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    # ── Health Check Endpoint ─────────────────
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ── Error Pages ───────────────────────────
    # All 404s go to React Router
    error_page 404 /index.html;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}